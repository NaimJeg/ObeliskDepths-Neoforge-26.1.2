pluginManagement {
    repositories {
        gradlePluginPortal()
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

includeBuild('libs/DamageNexus') {
    dependencySubstitution {
        substitute module('io.github.naimjeg:damagenexus') using project(':')
    }
}